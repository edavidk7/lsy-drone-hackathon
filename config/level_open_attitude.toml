# Open arena — attitude control mode
# No gates or obstacles. Used for random trajectory generation and testing.
#
# | Evaluation Scenario          | Randomized Inertial Properties | Randomized Obstacles, Gates | Randomized Tracks | Notes          |
# | :--------------------------: | :----------------------------: | :-------------------------: | :---------------: | :------------: |
# | `level_open_attitude.toml`   | *No*                           | *No*                        | *No*              | Open arena     |
[controller]
file = "attitude_mpc_lin.py"

[deploy]
check_race_track = true
check_drone_start_pos = true
real_track_objects = true

[[deploy.drones]]
id = 10
channel = 100
drone_model = "cf21B_500"

[sim]
physics = "first_principles"
drone_model = "cf21B_500"
freq = 500
attitude_freq = 500
render = true
camera = -1
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env]
id = "DroneRacing-v0"
seed = -1
freq = 50
sensor_range = 0.7
control_mode = "attitude"

[env.track]
randomize = false

# Placeholder gate and obstacle placed far outside the arena — the drone never
# reaches them. The environment requires at least one of each to initialise.
[[env.track.gates]]
pos = [10.0, 10.0, 1.0]
rpy = [0.0, 0.0, 0.0]

[[env.track.obstacles]]
pos = [10.0, 10.0, 1.55]

[[env.track.drones]]
pos = [-1.5, 0.75, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"
[env.disturbances.dynamics.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_pos]
fn = "uniform"
[env.randomizations.drone_pos.kwargs]
minval = [-0.1, -0.1, 0.0]
maxval = [0.1, 0.1, 0.02]

[env.randomizations.drone_rpy]
fn = "uniform"
[env.randomizations.drone_rpy.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_mass]
fn = "uniform"
[env.randomizations.drone_mass.kwargs]
minval = -0.005
maxval = 0.005

[env.randomizations.drone_inertia]
fn = "uniform"
[env.randomizations.drone_inertia.kwargs]
minval = [-0.000001, -0.000001, -0.000001]
maxval = [0.000001, 0.000001, 0.000001]
