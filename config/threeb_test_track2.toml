# threeb_test_track2.toml — minimal real-flight test: a single gate, then return home.
#
# Layout (track frame, origin = marked floor point, +x along the marked axis):
#
#   start ---------->  [  -->  ] ----> (loop back to start)
#  (-1.5, 0.75)         (-0.4,-0.6)
#
# The gate faces +x (yaw=0): the drone crosses it going +x, then the trajectory loops
# back to finish where it started (return_to_start = true).
#
# Gate SHORT (center 0.7 m). One obstacle parked in a far corner (env needs >=1).
# All coordinates well inside the safety box.

[controller]
file = "threeb_controller.py" # override on the CLI with --controller if needed
return_to_start = true        # finish the trajectory back at the takeoff point

[deploy]
real_track_objects = false   # lighthouse mode: nothing tracks the gates -> config IS ground truth
lighthouse = true            # use the drone's onboard Lighthouse estimate (no mocap)
check_race_track = true
check_drone_start_pos = true

[[deploy.drones]]
id = 11
channel = 80
drone_model = "cf21B_500"

[sim]
physics = "first_principles"
drone_model = "cf21B_500"
freq = 500
attitude_freq = 500
render = true
camera = -1
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env]
id = "DroneRacing-v0"
seed = -1
freq = 50
sensor_range = 100.0   # perfect knowledge: true gate/obstacle poses reported from t=0
control_mode = "attitude"

[env.track]
randomize = false

# Tall gates: 1.195 m center. Short gates: 0.695 m center. Opening 0.4 m, faces gate local x-axis (yaw).
[[env.track.gates]]
pos = [-0.4, -0.6, 0.7]
rpy = [0.0, 0.0, 0.0]      # forward = +x: drone crosses this one going +x

# One obstacle parked in a far corner, clear of the U-turn region. The env requires
# >=1 obstacle. Post is ~1.52 m tall -> z = 1.55.
[[env.track.obstacles]]
pos = [-1.3, 1.3, 1.55]

[[env.track.drones]]
pos = [-1.5, 0.75, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"
[env.disturbances.dynamics.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_pos]
fn = "uniform"
[env.randomizations.drone_pos.kwargs]
minval = [-0.1, -0.1, 0.0]
maxval = [0.1, 0.1, 0.02]

[env.randomizations.drone_rpy]
fn = "uniform"
[env.randomizations.drone_rpy.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_mass]
fn = "uniform"
[env.randomizations.drone_mass.kwargs]
minval = -0.005
maxval = 0.005

[env.randomizations.drone_inertia]
fn = "uniform"
[env.randomizations.drone_inertia.kwargs]
minval = [-0.000001, -0.000001, -0.000001]
maxval = [0.000001, 0.000001, 0.000001]

# Required by check_race_track (deploy.check_race_track = true): allowed tolerance
# between the config (nominal) gate/obstacle poses and where they are actually placed.
[env.randomizations.gate_pos]
fn = "uniform"
[env.randomizations.gate_pos.kwargs]
minval = [-0.15, -0.15, -0.1]
maxval = [0.15, 0.15, 0.1]

[env.randomizations.gate_rpy]
fn = "uniform"
[env.randomizations.gate_rpy.kwargs]
minval = [-0.05, -0.1, -0.2]
maxval = [0.05, 0.1, 0.2]

[env.randomizations.obstacle_pos]
fn = "uniform"
[env.randomizations.obstacle_pos.kwargs]
minval = [-0.15, -0.15, -0.05]
maxval = [0.15, 0.15, 0.05]
